// ---- PERSISTENCE ----
function deepClone(obj){return JSON.parse(JSON.stringify(obj));}
function saveState(){
  try{localStorage.setItem('ruleops_state',JSON.stringify({v:STATE_VERSION,rules:state.rules,agents:state.agents,agentOverrides:state.agentOverrides}));}catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem('ruleops_state');
    if(raw){
      const saved=JSON.parse(raw);
      if(saved.v===STATE_VERSION){
        state.rules=saved.rules||deepClone(DEFAULT_RULES);
        state.agents=saved.agents||deepClone(DEFAULT_AGENTS);
        state.agentOverrides=saved.agentOverrides||{};
        return;
      }
    }
  }catch(e){}
  state.rules=deepClone(DEFAULT_RULES);
  state.agents=deepClone(DEFAULT_AGENTS);
  state.agentOverrides={};
}
function persist(){saveState();render();}

// ---- HELPERS ----
function getAgent(id){
  const base=state.agents.find(a=>a.id===id);
  if(!base)return null;
  return{...base,...(state.agentOverrides[id]||{})};
}
function getInitials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function getStatus(aid){
  const a=getAgent(aid);
  if(!a)return'inactive';
  if(!a.sources||!a.sources.length)return'incomplete';
  if(state.rules.some(r=>r.assignments.some(x=>x.agentId===aid)))return'active';
  return'norules';
}
function sc(s){return s==='active'?'var(--color-text-success)':s==='norules'?'var(--color-text-warning)':'var(--color-text-danger)';}
function sb(s){return s==='active'?'var(--color-background-success)':s==='norules'?'var(--color-background-warning)':'var(--color-background-danger)';}

// ---- CSV PARSING ----
function parseCSVRow(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  res.push(cur.trim());
  return res;
}
function splitSemi(s){return(s||'').split(';').map(x=>x.trim()).filter(Boolean);}
function splitComma(s){return(s||'').split(',').map(x=>x.trim()).filter(Boolean);}

function parseRulesCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(!lines.length)throw new Error('Empty file');
  const hdrs=parseCSVRow(lines[0]).map(h=>h.toLowerCase().trim());
  const col={
    ruleName:hdrs.indexOf('rule name'),
    leadSource:hdrs.indexOf('lead source'),
    bizType:hdrs.indexOf('business type'),
    vertical:hdrs.indexOf('vertical'),
    locality:hdrs.indexOf('locality'),
    grade:hdrs.indexOf('vendor grade'),
    ops:hdrs.indexOf('applicable for operation'),
    raId:hdrs.indexOf('recommendation agent name'),
    agentName:hdrs.findIndex(h=>h.includes('full name')),
    rrId:hdrs.indexOf('recommendation rule agent id'),
  };
  if(col.ruleName<0||col.agentName<0)throw new Error('Columns "Rule Name" and "Sales Agent: Full Name" are required');
  const byRule=new Map();
  let newIdx=0;
  for(let i=1;i<lines.length;i++){
    const row=parseCSVRow(lines[i]);
    if(!row.some(c=>c))continue;
    const ruleName=(row[col.ruleName]||'').trim();
    const key=ruleName||('__NEW__'+(newIdx++));
    if(!byRule.has(key)){
      byRule.set(key,{
        id:ruleName||('NEW-upload-'+Date.now()+'-'+newIdx),
        sources:col.leadSource>=0?splitSemi(row[col.leadSource]):[],
        bizTypes:col.bizType>=0?splitSemi(row[col.bizType]):[],
        vertical:col.vertical>=0?splitSemi(row[col.vertical]):[],
        localities:col.locality>=0?splitComma(row[col.locality]):[],
        grades:col.grade>=0?splitSemi(row[col.grade]):[],
        ops:col.ops>=0?splitSemi(row[col.ops]):[],
        assignments:[]
      });
    }
    const agentName=(col.agentName>=0?row[col.agentName]:'').trim();
    if(!agentName)continue;
    const matchedAgent=state.agents.find(a=>a.name===agentName);
    byRule.get(key).assignments.push({
      agentId:matchedAgent?matchedAgent.id:null,
      agentName,
      raId:col.raId>=0?(row[col.raId]||''):'',
      rrId:col.rrId>=0?(row[col.rrId]||''):'',
      isNew:false,
      isFormer:!matchedAgent
    });
  }
  const result=Array.from(byRule.values()).filter(r=>r.assignments.length>0);
  if(!result.length)throw new Error('No valid rule rows found');
  return result;
}

function parseAgentsCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(!lines.length)throw new Error('Empty file');
  const hdrs=parseCSVRow(lines[0]).map(h=>h.toLowerCase().trim());
  const col={
    name:hdrs.indexOf('name'),
    sfId:hdrs.indexOf('sf_id'),
    email:hdrs.indexOf('email'),
    alias:hdrs.indexOf('sf_alias'),
    role:hdrs.indexOf('role'),
    source:hdrs.findIndex(h=>h.includes('account source')||h==='source'),
    bizType:hdrs.findIndex(h=>h.includes('business type')||h==='business types'),
  };
  if(col.name<0)throw new Error('Column "name" is required in agent CSV');
  const agents=[];
  for(let i=1;i<lines.length;i++){
    const row=parseCSVRow(lines[i]);
    if(!row.some(c=>c))continue;
    const name=(col.name>=0?row[col.name]:'').trim();
    if(!name)continue;
    agents.push({
      id:col.sfId>=0&&row[col.sfId]?row[col.sfId].trim():('agent-'+Date.now()+'-'+i),
      name,
      email:col.email>=0?(row[col.email]||'').trim():'',
      alias:col.alias>=0?(row[col.alias]||'').trim():'',
      role:col.role>=0?(row[col.role]||'').trim():'',
      sources:col.source>=0?splitComma(row[col.source]):[],
      bizTypes:col.bizType>=0?splitSemi(row[col.bizType]):[],
    });
  }
  if(!agents.length)throw new Error('No valid agent rows found');
  return agents;
}

// ---- EXPORT ----
function exportCSV(){
  const hdr='Rule Name,Lead Source,Business Type,Vertical,Locality,Vendor Grade,Applicable for Operation,Recommendation Agent Name,Sales Agent: Full Name,Recommendation Rule Agent ID';
  const rows=[];
  for(const r of state.rules){
    for(const a of r.assignments){
      const loc=r.localities.length?`"${r.localities.join(', ')}"` :'';
      rows.push([r.id.startsWith('NEW')?'':r.id,r.sources.join('; '),r.bizTypes.join('; '),r.vertical.join('; '),loc,r.grades.join('; '),r.ops.join('; '),a.raId||'',a.agentName,a.rrId||''].join(','));
    }
  }
  const content=[hdr,...rows].join('\n');
  const blob=new Blob([content],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a');
  el.href=url;el.download=`recommendation_rules_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(el);el.click();document.body.removeChild(el);URL.revokeObjectURL(url);
}

// ---- TOAST ----
function showToast(msg,type='success'){
  const t=document.createElement('div');
  const bg=type==='success'?'var(--color-background-success)':type==='error'?'var(--color-background-danger)':'var(--color-background-info)';
  const col=type==='success'?'var(--color-text-success)':type==='error'?'var(--color-text-danger)':'var(--color-text-info)';
  const bd=type==='success'?'var(--color-border-success)':type==='error'?'var(--color-border-danger)':'var(--color-border-info)';
  t.style.cssText=`position:fixed;top:20px;right:20px;z-index:9999;padding:12px 18px;background:${bg};color:${col};border:1px solid ${bd};border-radius:var(--border-radius-md);font-size:13px;font-weight:500;max-width:340px;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,.12);`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3500);
}

      <div style="flex:1;">
        <div style="font-weight:500;font-size:15px;margin-bottom:3px;color:var(--color-text-primary);">${agent.name}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;">
          <span style="font-size:12px;color:var(--color-text-secondary);">${agent.role}</span>·
          <span style="font-size:12px;color:var(--color-text-secondary);">${agent.email}</span>·
          <code style="font-size:11px;background:var(--color-background-secondary);padding:1px 6px;border-radius:4px;color:var(--color-text-secondary);">${agent.alias}</code>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;">
          ${agent.sources.length?agent.sources.map(src=>pill(src,'var(--color-background-info)','var(--color-text-info)')).join(''):pill('No account source — click Edit Profile','var(--color-background-danger)','var(--color-text-danger)')}
        </div>
        ${agent.bizTypes.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;">${agent.bizTypes.map(b=>pill(b,'var(--color-background-secondary)','var(--color-text-secondary)')).join('')}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        ${pill(s==='active'?'Active':s==='norules'?'No Rules':'Incomplete',sb(s),sc(s))}
        <button onclick="openEditProfile()" style="padding:4px 10px;border:1px solid var(--color-border-secondary);background:transparent;border-radius:var(--border-radius-md);font-size:11px;color:var(--color-text-secondary);">✏ Edit Profile</button>
      </div>
    </div>
    ${s!=='active'?`<div style="background:var(--color-background-warning);border:1px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-warning);">
      ⚠ ${s==='incomplete'?'No account source set. Click <strong>Edit Profile</strong> above to configure this agent.':'No recommendation rules assigned yet. Use the buttons below to add rules.'}
    </div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <span style="font-weight:500;font-size:14px;color:var(--color-text-primary);">Rules (${agentRules.length})</span>
      <div style="display:flex;gap:8px;">
        <button onclick="openAddToRule()" style="padding:5px 12px;border:1px solid ${PINK};color:${PINK};background:transparent;border-radius:var(--border-radius-md);font-size:12px;">+ Assign to existing</button>
        <button onclick="openCreateRule()" style="padding:5px 12px;background:${PINK};color:white;border:none;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;">+ New rule</button>
      </div>
    </div>
    ${agentRules.length===0?`<div style="text-align:center;padding:28px;color:var(--color-text-secondary);border:1px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);font-size:13px;">No rules assigned yet.</div>`:agentRules.map(r=>renderRuleCard(r,agent.id)).join('')}
  </div>`;
}

function renderModal(){
  if(!state.modal)return'';
  const m=state.modal;
  const agent=getAgent(state.selectedId);
  let title='',content='',saveBtn='';
  if(m.type==='editRule'){
    const rule=state.rules.find(r=>r.id===m.ruleId);
    const acts=rule?rule.assignments.filter(a=>!a.isFormer):[];
    title=`Edit rule: ${m.ruleId}`;
    content=`${acts.length>1?`<div style="background:var(--color-background-warning);border:1px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--color-text-warning);">⚠ Shared by ${acts.length} agents — changes affect all. Leads distributed by round robin.</div>`:''}${renderRuleForm(state.modalForm,'edit')}`;
    saveBtn=`<button onclick="saveEditRule()" style="padding:7px 18px;background:${PINK};color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;">Save changes</button>`;
  }else if(m.type==='createRule'){
    title=`Create new rule for ${agent?agent.name:''}`;
    content=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:14px;">Lead sources pre-filled from agent profile. New rules export with a blank Rule Name — Salesforce generates the ID on import.</p>${renderRuleForm(state.modalForm,'create')}`;
    saveBtn=`<button onclick="saveCreateRule()" style="padding:7px 18px;background:${PINK};color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;">Create rule</button>`;
  }else if(m.type==='addToRule'){
    const compat=state.rules.filter(r=>!r.assignments.some(a=>a.agentId===state.selectedId)&&(r.sources.length===0||agent.sources.some(src=>r.sources.includes(src))));
    title=`Assign ${agent?agent.name:''} to existing rule`;
    content=compat.length===0?`<div style="text-align:center;padding:24px;color:var(--color-text-secondary);">No compatible rules found. Create a new rule instead.</div>`:
    `<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;">Only rules compatible with this agent's account sources shown. Click a rule to assign.</p>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;">
    ${compat.map(r=>{const acts=r.assignments.filter(a=>!a.isFormer);
      return`<div onclick="addToExisting('${r.id}')" style="border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 12px;cursor:pointer;" onmouseover="this.style.borderColor='${PINK}'" onmouseout="this.style.borderColor='var(--color-border-tertiary)'">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="font-weight:500;font-size:13px;color:var(--color-text-primary);">${r.id}</span>${vertPills(r.vertical)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;">${rtags(r.sources,3)} ${rtags(r.ops,2)}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);">${acts.length} agent${acts.length!==1?'s':''} assigned${r.localities.length?` · ${r.localities.length} localities`:''}</div>
      </div>`;}).join('')}
    </div>`;
  }else if(m.type==='confirmRemove'){
    const ag2=getAgent(state.selectedId);
    title='Confirm removal';
    content=`<p style="font-size:14px;margin-bottom:8px;color:var(--color-text-primary);">Remove <strong>${ag2?ag2.name:''}</strong> from rule <strong>${m.ruleId}</strong>?</p><p style="font-size:12px;color:var(--color-text-secondary);">This agent will be omitted from the next CSV export for this rule. Delete their Salesforce record manually if needed. Other agents in the rule are unaffected.</p>`;
    saveBtn=`<button onclick="doRemove('${m.ruleId}')" style="padding:7px 18px;background:var(--color-text-danger);color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;">Yes, remove</button>`;
  }else if(m.type==='editProfile'){
    const ag3=getAgent(state.selectedId);
    title=`Edit profile: ${ag3?ag3.name:''}`;
    content=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:14px;">Set the account sources and business types this agent can handle. Changes update rule compatibility checks immediately.</p>
    <div style="margin-bottom:14px;">${fldH('Account Sources')}<div style="display:flex;flex-wrap:wrap;gap:2px 14px;">${renderCboxes(LS,'sources','prof')}</div></div>
    <div style="margin-bottom:6px;">${fldH('Business Types')}<div style="display:flex;flex-wrap:wrap;gap:2px 14px;">${renderCboxes(BT,'bizTypes','prof')}</div></div>`;
    saveBtn=`<button onclick="saveEditProfile()" style="padding:7px 18px;background:${PINK};color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;">Save profile</button>`;
  }else if(m.type==='replaceFormer'){
    const rule=state.rules.find(r=>r.id===m.ruleId);
    const former=rule?rule.assignments.find(a=>a.raId===m.formerRaId):null;
    const existIds=rule?rule.assignments.filter(a=>!a.isFormer).map(a=>a.agentId):[];
    const compat=state.agents.filter(a=>{const ag=getAgent(a.id);if(existIds.includes(a.id))return false;if(!rule)return true;return ag.sources.length===0||rule.sources.length===0||ag.sources.some(src=>rule.sources.includes(src));});
    title=`Replace ${former?former.agentName:'former agent'} in ${m.ruleId}`;
    content=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px;">Select a team member to take over this assignment. Former agent will be removed and new assignment created on export. Delete their Salesforce record manually after importing.</p>
    <div style="max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
      ${compat.map(a=>{const ag=getAgent(a.id);const s=getStatus(a.id);
        return`<div onclick="doReplaceFormer('${m.ruleId}','${m.formerRaId}','${a.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;" onmouseover="this.style.borderColor='${PINK}'" onmouseout="this.style.borderColor='var(--color-border-tertiary)'">
          <div style="width:32px;height:32px;border-radius:50%;background:${sb(s)};color:${sc(s)};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;">${getInitials(a.name)}</div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:500;color:var(--color-text-primary);">${a.name}</div><div style="font-size:11px;color:var(--color-text-secondary);">${a.role} · ${ag.sources.join(', ')||'No sources set'}</div></div>
          ${sdot(s)}
        </div>`;}).join('')}
      ${compat.length===0?`<div style="text-align:center;padding:20px;color:var(--color-text-secondary);">No compatible agents available.</div>`:''}
    </div>`;
  }
  return`<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;">
    <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);width:100%;max-width:600px;border:1px solid var(--color-border-secondary);margin:auto;">
      <div style="padding:13px 18px;border-bottom:1px solid var(--color-border-tertiary);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:500;font-size:14px;color:var(--color-text-primary);">${title}</span>
        <button onclick="st({modal:null,modalForm:null})" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--color-text-secondary);line-height:1;padding:0 4px;">×</button>
      </div>
      <div style="padding:16px 18px;max-height:70vh;overflow-y:auto;">${content}</div>
      <div style="padding:12px 18px;border-top:1px solid var(--color-border-tertiary);display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="st({modal:null,modalForm:null})" style="padding:7px 16px;border:1px solid var(--color-border-secondary);background:transparent;border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-primary);">Cancel</button>
        ${saveBtn}
      </div>
    </div>
  </div>`;
}

function renderHeader(){
  const attn=state.agents.filter(a=>getStatus(a.id)!=='active').length;
  const pend=state.rules.filter(r=>r.id.startsWith('NEW')||r.assignments.some(a=>a.isNew)).length;
  return`<div style="background:var(--color-background-secondary);border-bottom:1px solid var(--color-border-tertiary);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:30px;height:30px;border-radius:8px;background:${PINK};display:flex;align-items:center;justify-content:center;color:white;font-size:16px;flex-shrink:0;">⚡</div>
      <div>
        <span style="font-weight:600;font-size:14px;letter-spacing:-.3px;color:var(--color-text-primary);">RuleOps</span>
        <span style="font-size:11px;color:var(--color-text-secondary);margin-left:8px;">Recommendation Rule Manager</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      ${attn?`<span style="background:var(--color-background-warning);color:var(--color-text-warning);padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;">⚠ ${attn} without rules</span>`:''}
      ${pend?`<span style="background:var(--color-background-info);color:var(--color-text-info);padding:3px 10px;border-radius:999px;font-size:11px;">${pend} pending</span>`:''}
      <button onclick="document.getElementById('agentsCSVInput').click()" style="padding:6px 12px;border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);border-radius:var(--border-radius-md);font-size:12px;">↑ Upload Agents</button>
      <button onclick="document.getElementById('rulesCSVInput').click()" style="padding:6px 12px;border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);border-radius:var(--border-radius-md);font-size:12px;">↑ Upload Rules</button>
      <button onclick="exportCSV()" style="padding:6px 14px;background:${PINK};color:white;border:none;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;">↓ Export CSV</button>
      <button onclick="resetDefaults()" title="Reset to defaults" style="padding:6px 8px;border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);border-radius:var(--border-radius-md);font-size:12px;" title="Reset all data to defaults">↺</button>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  app.innerHTML=`${renderHeader()}<div style="display:flex;flex:1;overflow:hidden;">${renderSidebar()}<div style="flex:1;overflow-y:auto;background:var(--color-background-tertiary);">${state.selectedId?renderAgentDetail():renderDashboard()}</div></div>${renderModal()}`;
}

// ---- HANDLERS ----
window.st=p=>{Object.assign(state,p);persist();};
window.render=render;

window.openEditRule=id=>{const r=state.rules.find(x=>x.id===id);if(!r)return;state.modal={type:'editRule',ruleId:id};state.modalForm={sources:[...r.sources],bizTypes:[...r.bizTypes],vertical:[...r.vertical],localities:[...r.localities],grades:[...r.grades],ops:[...r.ops]};render();};
window.saveEditRule=()=>{state.rules=state.rules.map(r=>r.id===state.modal.ruleId?{...r,...state.modalForm}:r);state.modal=null;state.modalForm=null;persist();};
window.openCreateRule=()=>{const a=getAgent(state.selectedId);state.modal={type:'createRule'};state.modalForm={sources:a?[...a.sources]:[],bizTypes:a?[...a.bizTypes]:[],vertical:[],localities:[],grades:[],ops:[]};render();};
window.saveCreateRule=()=>{const a=getAgent(state.selectedId);if(!a)return;const nr={id:'NEW-'+Date.now(),...state.modalForm,assignments:[{agentId:a.id,agentName:a.name,raId:'',rrId:'',isNew:true}]};state.rules=[...state.rules,nr];state.modal=null;state.modalForm=null;persist();};
window.openAddToRule=()=>{state.modal={type:'addToRule'};state.modalForm=null;render();};
window.addToExisting=id=>{const a=getAgent(state.selectedId);if(!a)return;state.rules=state.rules.map(r=>r.id===id?{...r,assignments:[...r.assignments,{agentId:a.id,agentName:a.name,raId:'',rrId:'',isNew:true}]}:r);state.modal=null;state.modalForm=null;persist();};
window.confirmRemove=id=>{state.modal={type:'confirmRemove',ruleId:id};state.modalForm=null;render();};
window.doRemove=id=>{state.rules=state.rules.map(r=>r.id===id?{...r,assignments:r.assignments.filter(a=>a.agentId!==state.selectedId)}:r);state.modal=null;state.modalForm=null;persist();};
window.openEditProfile=()=>{const a=getAgent(state.selectedId);state.modal={type:'editProfile'};state.modalForm={sources:a?[...a.sources]:[],bizTypes:a?[...a.bizTypes]:[]};render();};
window.saveEditProfile=()=>{if(!state.selectedId||!state.modalForm)return;state.agentOverrides[state.selectedId]={...state.modalForm};state.modal=null;state.modalForm=null;persist();};
window.openReplaceFormer=(ruleId,raId)=>{state.modal={type:'replaceFormer',ruleId,formerRaId:raId};state.modalForm=null;render();};
window.doReplaceFormer=(ruleId,formerRaId,newAgentId)=>{const a=getAgent(newAgentId);if(!a)return;state.rules=state.rules.map(r=>r.id!==ruleId?r:{...r,assignments:[...r.assignments.filter(x=>x.raId!==formerRaId),{agentId:newAgentId,agentName:a.name,raId:'',rrId:'',isNew:true}]});state.modal=null;state.modalForm=null;persist();};
window.updateField=(prefix,field,value,checked)=>{if(!state.modalForm)return;const arr=state.modalForm[field]?[...state.modalForm[field]]:[];state.modalForm[field]=checked?[...arr,value]:arr.filter(v=>v!==value);render();};
window.updateLocField=(prefix,loc,checked)=>{if(!state.modalForm)return;const arr=state.modalForm.localities?[...state.modalForm.localities]:[];state.modalForm.localities=checked?[...arr,loc]:arr.filter(v=>v!==loc);render();};
window.setAllLoc=(prefix,all)=>{if(!state.modalForm)return;state.modalForm.localities=all?[...LOCS]:[];render();};
window.filterLoc=prefix=>{const q=document.getElementById(prefix+'LS');if(!q)return;const v=q.value.toLowerCase();document.querySelectorAll('.'+prefix+'LI').forEach(el=>{el.style.display=el.dataset.loc.toLowerCase().includes(v)?'':'none';});};

window.handleRulesUpload=function(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const newRules=parseRulesCSV(e.target.result);
      state.rules=newRules;
      persist();
      showToast(`✓ Loaded ${newRules.length} rules from "${file.name}"`, 'success');
    }catch(err){showToast('Error parsing rules CSV: '+err.message,'error');}
  };
  reader.readAsText(file);
  event.target.value='';
};

window.handleAgentsUpload=function(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const newAgents=parseAgentsCSV(e.target.result);
      state.agents=newAgents;
      persist();
      showToast(`✓ Loaded ${newAgents.length} agents from "${file.name}"`, 'success');
    }catch(err){showToast('Error parsing agents CSV: '+err.message,'error');}
  };
  reader.readAsText(file);
  event.target.value='';
};

window.resetDefaults=function(){
  if(!confirm('Reset all data to defaults? This clears uploaded CSVs and all changes.'))return;
  localStorage.removeItem('ruleops_state');
  location.reload();
};

// ---- INIT ----
loadState();
render();
</script>
</body>
</html>
