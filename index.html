let state={
  agents:[],rules:[],agentOverrides:{},
  selectedId:null,search:'',roleFilter:'All',modal:null,modalForm:null,showHelp:false
};

// ---- PERSISTENCE ----
function deepClone(obj){return JSON.parse(JSON.stringify(obj));}
function saveState(){
  try{localStorage.setItem('ruleops_state',JSON.stringify({v:STATE_VERSION,rules:state.rules,agents:state.agents,agentOverrides:state.agentOverrides}));}catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem('ruleops_state');
    if(raw){
      const saved=JSON.parse(raw);
      if(saved.v===STATE_VERSION){
        state.rules=saved.rules||deepClone(DEFAULT_RULES);
        state.agents=saved.agents||deepClone(DEFAULT_AGENTS);
        state.agentOverrides=saved.agentOverrides||{};
        return;
      }
    }
  }catch(e){}
  state.rules=deepClone(DEFAULT_RULES);
  state.agents=deepClone(DEFAULT_AGENTS);
  state.agentOverrides={};
}
function persist(){saveState();render();}

// ---- HELPERS ----
function getAgent(id){
  const base=state.agents.find(a=>a.id===id);
  if(!base)return null;
  return{...base,...(state.agentOverrides[id]||{})};
}
function getInitials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function getStatus(aid){
  const a=getAgent(aid);
  if(!a)return'inactive';
  if(!a.sources||!a.sources.length)return'incomplete';
  if(state.rules.some(r=>r.assignments.some(x=>x.agentId===aid)))return'active';
  return'norules';
}
function sc(s){return s==='active'?'var(--color-text-success)':s==='norules'?'var(--color-text-warning)':'var(--color-text-danger)';}
function sb(s){return s==='active'?'var(--color-background-success)':s==='norules'?'var(--color-background-warning)':'var(--color-background-danger)';}
function getBP(agentId){
  const a=getAgent(agentId);
  if(!a)return null;
  const d=displayRole(a.role);
  if(d==='Field Sales'||d==='Sales Team Lead')return BEST_PRACTICES['BDM'];
  if(d==='Telesales')return BEST_PRACTICES['Telesales'];
  return null; // Digital Sales has no best practice template
}
function checkBP(rule,agentId){
  const bp=getBP(agentId);if(!bp)return null;
  const missingOps=bp.ops.filter(op=>!rule.ops.includes(op));
  const missingSrc=bp.sources.filter(s=>!rule.sources.includes(s));
  const missingBiz=bp.bizTypes.filter(b=>!rule.bizTypes.includes(b));
  return{ok:!missingOps.length&&!missingSrc.length&&!missingBiz.length,missingOps,missingSrc,missingBiz,bp};
}
// ---- FILE PARSING HELPERS ----
// Flexible column finder — tries multiple header name variations
function findCol(hdrs,...names){
  for(const n of names){const i=hdrs.findIndex(h=>h===n||h.includes(n));if(i>=0)return i;}
  return -1;
}

// Normalise a name for fuzzy matching — lowercase, collapse hyphens/spaces
function normName(s){return(s||'').toLowerCase().replace(/[-–—]/g,' ').replace(/\s+/g,' ').trim();}

// After either CSV upload, re-scan all rule assignments and try to (re-)match
// agents using normalised names — fixes mismatches between Salesforce report exports
function rematchRuleAgents(){
  state.rules=state.rules.map(r=>({
    ...r,
    assignments:r.assignments.map(a=>{
      // Already matched and agent still in team → keep
      if(a.agentId&&state.agents.find(ag=>ag.id===a.agentId)&&!a.isFormer)return a;
      // Try to find by normalised name
      const match=state.agents.find(ag=>normName(ag.name)===normName(a.agentName));
      if(match)return{...a,agentId:match.id,isFormer:false};
      // No match → mark as former
      return{...a,agentId:null,isFormer:true};
    })
  }));
}

// Converts any uploaded file (CSV / XLS / XLSX) to a CSV text string
function parseFileAsCSV(file){
  return new Promise((resolve,reject)=>{
    const ext=file.name.split('.').pop().toLowerCase();
    const reader=new FileReader();
    if(ext==='csv'){
      reader.onload=e=>resolve(e.target.result);
      reader.onerror=()=>reject(new Error('Failed to read file'));
      reader.readAsText(file);
    }else if(ext==='xls'||ext==='xlsx'){
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result,{type:'binary'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          resolve(XLSX.utils.sheet_to_csv(ws));
        }catch(err){reject(new Error('Failed to parse Excel file: '+err.message));}
      };
      reader.onerror=()=>reject(new Error('Failed to read file'));
      reader.readAsBinaryString(file);
    }else{
      reject(new Error('Unsupported file type. Please use CSV, XLS, or XLSX.'));
    }
  });
}
function parseCSVRow(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  res.push(cur.trim());
  return res;
}
function splitSemi(s){return(s||'').split(';').map(x=>x.trim()).filter(Boolean);}
function splitComma(s){return(s||'').split(',').map(x=>x.trim()).filter(Boolean);}

function parseRulesCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(!lines.length)throw new Error('Empty file');
  const hdrs=parseCSVRow(lines[0]).map(h=>h.toLowerCase().trim());
  const col={
    ruleName:findCol(hdrs,'rule name'),
    leadSource:findCol(hdrs,'lead source'),
    bizType:findCol(hdrs,'business type'),
    vertical:findCol(hdrs,'vertical'),
    locality:findCol(hdrs,'locality'),
    grade:findCol(hdrs,'vendor grade'),
    ops:findCol(hdrs,'applicable for operation'),
    raId:findCol(hdrs,'recommendation agent name'),
    // Handle both 'sales agent: full name' and 'sales agent full name'
    agentName:hdrs.findIndex(h=>h.includes('full name')&&(h.includes('sales agent')||h.includes('agent'))),
    rrId:findCol(hdrs,'recommendation rule agent id'),
  };
  // Fallback: any column with 'full name' if the above didn't find it
  if(col.agentName<0)col.agentName=hdrs.findIndex(h=>h.includes('full name'));
  if(col.ruleName<0||col.agentName<0)throw new Error('Columns "Rule Name" and "Sales Agent: Full Name" are required');
  const byRule=new Map();
  let newIdx=0;
  for(let i=1;i<lines.length;i++){
    const row=parseCSVRow(lines[i]);
    if(!row.some(c=>c))continue;
    const ruleName=(row[col.ruleName]||'').trim();
    const key=ruleName||('__NEW__'+(newIdx++));
    if(!byRule.has(key)){
      byRule.set(key,{
        id:ruleName||('NEW-upload-'+Date.now()+'-'+newIdx),
        sources:col.leadSource>=0?splitSemi(row[col.leadSource]):[],
        bizTypes:col.bizType>=0?splitSemi(row[col.bizType]):[],
        vertical:col.vertical>=0?splitSemi(row[col.vertical]):[],
        localities:col.locality>=0?splitComma(row[col.locality]):[],
        grades:col.grade>=0?splitSemi(row[col.grade]):[],
        ops:col.ops>=0?splitSemi(row[col.ops]):[],
        assignments:[]
      });
    }
    const agentName=(col.agentName>=0?row[col.agentName]:'').trim();
    if(!agentName)continue;
    // Use normalised name matching to handle capitalisation and hyphen differences
    const matchedAgent=state.agents.find(a=>normName(a.name)===normName(agentName));
    byRule.get(key).assignments.push({
      agentId:matchedAgent?matchedAgent.id:null,
      agentName,
      raId:col.raId>=0?(row[col.raId]||''):'',
      rrId:col.rrId>=0?(row[col.rrId]||''):'',
      isNew:false,
      isFormer:!matchedAgent
    });
  }
  const result=Array.from(byRule.values()).filter(r=>r.assignments.length>0);
  if(!result.length)throw new Error('No valid rule rows found');
  return result;
}

function inferSourcesFromRole(roleName){
  const d=displayRole(roleName);
  if(d==='Field Sales'||d==='Sales Team Lead')return['Own Research','Automated LeadGen','Import'];
  if(d==='Telesales')return['Self Sign Up','Inbound'];
  if(d==='Digital Sales')return['Self Sign Up'];
  // Fallback: raw keyword matching for unrecognised roles
  const r=(roleName||'').toLowerCase();
  if(r.includes('bdm')||r.includes('field sales')||r.includes('business dev'))return['Own Research','Automated LeadGen','Import'];
  if(r.includes('telesales')||r.includes('tele sales'))return['Self Sign Up','Inbound'];
  if(r.includes('digital')||r.includes('sales ops'))return['Self Sign Up'];
  return[];
}

function parseAgentsCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(!lines.length)throw new Error('Empty file');
  const hdrs=parseCSVRow(lines[0]).map(h=>h.toLowerCase().trim());

  // Guard: detect if user accidentally uploaded the rules file
  if(hdrs.some(h=>h.includes('applicable for operation')||h.includes('recommendation agent name')||h==='rule name')){
    throw new Error('This looks like a Recommendation Rules file, not a Sales Team file. Please use ↑ Upload Rules for this file, and upload your Sales Team Details report here instead.');
  }

  const col={
    name:findCol(hdrs,'full name','name','sales agent: full name','sales agent full name','user: full name','agent name'),
    sfId:findCol(hdrs,'user id','sf_id','userid','salesforce id','sf id','user: id'),
    email:findCol(hdrs,'email','email address','user: email'),
    alias:findCol(hdrs,'alias','sf_alias','user: alias'),
    // Prefer 'central job role' — avoid 'job role vertical' which holds Restaurant/Shop not the role name
    role:hdrs.findIndex(h=>(h==='central job role'||h==='role'||h==='user role'||h==='position'||h.includes('title'))&&!h.includes('vertical')),
    // Source column — may not exist in all Salesforce exports
    source:findCol(hdrs,'account source','lead source allocation','source allocation'),
    bizType:findCol(hdrs,'business type','business types','biz type'),
  };

  if(col.name<0)throw new Error('Could not find a name column. Expected "Full Name", "name", or similar.');

  const seen=new Set();
  const agents=[];
  for(let i=1;i<lines.length;i++){
    const row=parseCSVRow(lines[i]);
    if(!row.some(c=>c))continue;
    const name=(col.name>=0?row[col.name]:'').trim();
    if(!name||seen.has(name))continue;
    seen.add(name);

    const roleName=col.role>=0?(row[col.role]||'').trim():'';

    // Source: try explicit column first; fall back to role-based inference
    let sources=[];
    if(col.source>=0&&row[col.source]){
      const raw=row[col.source].trim();
      sources=raw.includes(';')?splitSemi(raw):splitComma(raw);
    }
    if(!sources.length&&roleName)sources=inferSourcesFromRole(roleName);

    agents.push({
      id:col.sfId>=0&&row[col.sfId]?row[col.sfId].trim():('agent-'+Date.now()+'-'+i),
      name,
      email:col.email>=0?(row[col.email]||'').trim():'',
      alias:col.alias>=0?(row[col.alias]||'').trim():'',
      role:roleName,
      sources,
      bizTypes:col.bizType>=0?splitSemi(row[col.bizType]):[],
    });
  }
  if(!agents.length)throw new Error('No valid Sales Team rows found');
  return agents;
}

// ---- EXPORT ----
function exportExcel(){
  const headers=['Rule Name','Lead Source','Business Type','Vertical','Locality','Vendor Grade','Applicable for Operation','Recommendation Agent Name','Sales Agent: Full Name','Recommendation Rule Agent ID'];
  const existingRows=[];
  const newRows=[];

  for(const r of state.rules){
    for(const a of r.assignments){
      const loc=r.localities.length?r.localities.join(', '):'';
      const row=[
        r.id.startsWith('NEW')?'':r.id,
        r.sources.join('; '),
        r.bizTypes.join('; '),
        r.vertical.join('; '),
        loc,
        r.grades.join('; '),
        r.ops.join('; '),
        a.raId||'',
        a.agentName,
        a.rrId||(a.agentId||'')
      ];
      if(r.id.startsWith('NEW'))newRows.push(row);
      else existingRows.push(row);
    }
  }

  const colWidths=[{wch:12},{wch:30},{wch:32},{wch:12},{wch:55},{wch:22},{wch:55},{wch:18},{wch:30},{wch:22}];

  const wb=XLSX.utils.book_new();

  const ws1=XLSX.utils.aoa_to_sheet([headers,...existingRows]);
  ws1['!cols']=colWidths;
  XLSX.utils.book_append_sheet(wb,ws1,'Existing Rules');

  const ws2=XLSX.utils.aoa_to_sheet([headers,...newRows]);
  ws2['!cols']=colWidths;
  XLSX.utils.book_append_sheet(wb,ws2,'New Rules');

  XLSX.writeFile(wb,`recommendation_rules_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function sdot(s){return`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${sc(s)};flex-shrink:0;"></span>`;}
function rtags(arr,max,bg,col){

  if(!arr||!arr.length)return`<em style="color:var(--color-text-secondary);font-size:11px;">Any</em>`;

function renderDashboard(){
  const norules=state.agents.filter(a=>getStatus(a.id)==='norules');
  const incomplete=state.agents.filter(a=>getStatus(a.id)==='incomplete');

      <div>
        <div style="font-weight:500;font-size:12px;color:var(--color-text-info);margin-bottom:2px;">📊 Salesforce Reports — download before uploading</div>

      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a href="${SF_LINKS.agents.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--color-text-info);color:white;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;text-decoration:none;white-space:nowrap;">
          👥 Sales Team Details ↗
        </a>
        <a href="${SF_LINKS.rules.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--color-text-info);color:white;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;text-decoration:none;white-space:nowrap;">
          📋 Recommendation Rules ↗
        </a>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
      ${[['Total',state.agents.length,'var(--color-text-primary)'],['With Rules',state.agents.filter(a=>getStatus(a.id)==='active').length,'var(--color-text-success)'],['Need Rules',norules.length,'var(--color-text-warning)'],['Incomplete',incomplete.length,'var(--color-text-danger)']].map(([l,v,c])=>`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px;border:1px solid var(--color-border-tertiary);"><div style="font-size:26px;font-weight:500;color:${c};">${v}</div><div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px;">${l}</div></div>`).join('')}
    </div>
    ${(norules.length||incomplete.length)?`<div style="background:var(--color-background-warning);border:1px solid var(--color-border-warning);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:12px;">
      <div style="font-weight:500;font-size:12px;color:var(--color-text-warning);margin-bottom:8px;">⚠ ${norules.length+incomplete.length} agents need attention — click to open and assign rules</div>
      ${[...norules.map(a=>({...a,issue:'No rules assigned'})),...incomplete.map(a=>({...a,issue:'No account source — use Edit Profile'}))].map(a=>`<div onclick="st({selectedId:'${a.id}'})" style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--color-border-warning);cursor:pointer;">
        <div style="width:26px;height:26px;border-radius:50%;background:${sb(getStatus(a.id))};color:${sc(getStatus(a.id))};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;">${getInitials(a.name)}</div>
        <div style="flex:1;"><div style="font-size:12px;color:var(--color-text-primary);">${a.name}</div><div style="font-size:11px;color:var(--color-text-warning);">${a.issue}</div></div>
        <span style="font-size:11px;color:var(--color-text-secondary);">${displayRole(a.role)} →</span>
      </div>`).join('')}
    </div>`:''}
    ${formers.length?`<div style="background:var(--color-background-danger);border:1px solid var(--color-border-danger);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:12px;">
      <div style="font-weight:500;font-size:12px;color:var(--color-text-danger);margin-bottom:6px;">Former Sales Team members in active rules — replace or remove manually in Salesforce</div>
      ${formers.map(f=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--color-border-danger);flex-wrap:wrap;">
        <div style="flex:1;"><span style="font-size:12px;color:var(--color-text-danger);">${f.name}</span><span style="font-size:11px;color:var(--color-text-danger);opacity:.7;margin-left:6px;">in ${f.ruleId}</span> ${vertPills(f.vert)}</div>
        <button onclick="openReplaceFormer('${f.ruleId}','${f.raId}')" style="font-size:11px;padding:3px 12px;background:${PINK};color:white;border:none;border-radius:999px;flex-shrink:0;">Replace agent</button>
      </div>`).join('')}
    </div>`:''}
    ${(newRules.length||modified.length)?`<div style="background:var(--color-background-info);border:1px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-info);">
      ℹ ${newRules.length} new rule${newRules.length!==1?'s':''} and ${modified.length} modified rule${modified.length!==1?'s':''} pending export.
    </div>`:''}
    <div style="background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;">
      <div style="padding:10px 14px;border-bottom:1px solid var(--color-border-tertiary);font-weight:500;font-size:13px;color:var(--color-text-primary);">All rules (${state.rules.length})</div>
      <div style="overflow-y:auto;max-height:calc(100vh - 480px);">
        ${state.rules.map(r=>{const acts=r.assignments.filter(a=>!a.isFormer);const fm=r.assignments.filter(a=>a.isFormer);
          return`<div style="padding:9px 14px;border-bottom:1px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;font-size:12px;">
            <span style="font-weight:500;min-width:88px;color:var(--color-text-primary);">${r.id.startsWith('NEW')?'New Rule':r.id}</span>
            ${vertPills(r.vertical)}
            <div style="flex:1;display:flex;flex-wrap:wrap;gap:3px;">${rtags(r.sources,2)} ${rtags(r.ops,1)}</div>
            <span style="color:var(--color-text-secondary);white-space:nowrap;">${acts.length} Sales Team member${acts.length!==1?'s':''}</span>
            ${fm.length?pill(fm.length+' former','var(--color-background-warning)','var(--color-text-warning)',true):''}
          </div>`;}).join('')}
      </div>
    </div>
  </div>`;
}

    <div style="background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px;">
      <div style="width:46px;height:46px;border-radius:50%;background:${sb(s)};color:${sc(s)};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0;">${getInitials(agent.name)}</div>

        </div>

      </div>

      ⚠ ${s==='incomplete'?'No account source set. Click <strong>Edit Profile</strong> above to configure this Sales Team member.':'No recommendation rules assigned yet. Use the buttons below to add rules.'}

function renderModal(){
  if(!state.modal)return'';
  const m=state.modal;
  const agent=getAgent(state.selectedId);
  let title='',content='',saveBtn='';
  if(m.type==='editRule'){
    const rule=state.rules.find(r=>r.id===m.ruleId);
    const acts=rule?rule.assignments.filter(a=>!a.isFormer):[];
    const agent=getAgent(state.selectedId);
    const bpCheck=rule&&agent?checkBP(rule,agent.id):null;
    title=`Edit rule: ${m.ruleId}`;
    content=`${acts.length>1?`<div style="background:var(--color-background-warning);border:1px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-warning);">⚠ Shared by ${acts.length} Sales Team members — changes affect all. Leads distributed by round robin.</div>`:''}
    ${bpCheck?bpCheck.ok?
      `<div style="background:var(--color-background-success);border:1px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-success);">✓ This rule follows best practice for <strong>${bpCheck.bp.label}</strong></div>`:
      `<div style="background:var(--color-background-warning);border:1px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-warning);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
          <div><strong>⚠ Missing best practice settings for ${bpCheck.bp.label}</strong>
            ${bpCheck.missingOps.length?`<div style="margin-top:4px;">Operations: <em>${bpCheck.missingOps.join(', ')}</em></div>`:''}
            ${bpCheck.missingSrc.length?`<div>Lead Sources: <em>${bpCheck.missingSrc.join(', ')}</em></div>`:''}
            ${bpCheck.missingBiz.length?`<div>Business Types: <em>${bpCheck.missingBiz.join(', ')}</em></div>`:''}
          </div>
          <button onclick="applyBP()" style="white-space:nowrap;padding:4px 12px;background:${PINK};color:white;border:none;border-radius:999px;font-size:11px;flex-shrink:0;">Apply best practice</button>
        </div>
      </div>`
    :''}
    ${renderRuleForm(state.modalForm,'edit')}`;
    saveBtn=`<button onclick="saveEditRule()" style="padding:7px 18px;background:${PINK};color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;">Save changes</button>`;
  }else if(m.type==='createRule'){
    const agent2=getAgent(state.selectedId);
    const bp2=getBP(state.selectedId);
    title=`Create new rule for ${agent2?agent2.name:''}`;
    content=`${bp2?`<div style="background:var(--color-background-success);border:1px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-success);">✓ Pre-filled with <strong>${bp2.label} best practice defaults</strong>. Adjust localities and vendor grades as needed.</div>`:`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:14px;">New rules export with a blank Rule Name — Salesforce generates the ID on import.</p>`}
    ${renderRuleForm(state.modalForm,'create')}`;
    saveBtn=`<button onclick="saveCreateRule()" style="padding:7px 18px;background:${PINK};color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;">Create rule</button>`;
  }else if(m.type==='addToRule'){
    const compat=state.rules.filter(r=>!r.assignments.some(a=>a.agentId===state.selectedId)&&(r.sources.length===0||agent.sources.some(src=>r.sources.includes(src))));
    title=`Assign ${agent?agent.name:''} to existing rule`;
    content=compat.length===0?`<div style="text-align:center;padding:24px;color:var(--color-text-secondary);">No compatible rules found. Create a new rule instead.</div>`:
    `<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;">Only rules compatible with this Sales Team member's account sources shown. Click a rule to assign.</p>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;">
    ${compat.map(r=>{const acts=r.assignments.filter(a=>!a.isFormer);
      return`<div onclick="addToExisting('${r.id}')" style="border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 12px;cursor:pointer;" onmouseover="this.style.borderColor='${PINK}'" onmouseout="this.style.borderColor='var(--color-border-tertiary)'">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="font-weight:500;font-size:13px;color:var(--color-text-primary);">${r.id}</span>${vertPills(r.vertical)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;">${rtags(r.sources,3)} ${rtags(r.ops,2)}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);">${acts.length} Sales Team member${acts.length!==1?'s':''} assigned${r.localities.length?` · ${r.localities.length} localities`:''}</div>
      </div>`;}).join('')}
    </div>`;
  }else if(m.type==='confirmRemove'){
    const ag2=getAgent(state.selectedId);

    content=`<p style="font-size:14px;margin-bottom:8px;color:var(--color-text-primary);">Remove <strong>${ag2?ag2.name:''}</strong> from rule <strong>${m.ruleId}</strong>?</p><p style="font-size:12px;color:var(--color-text-secondary);">This Sales Team member will be omitted from the next CSV export for this rule. Delete their Salesforce record manually if needed. Other Sales Team members in the rule are unaffected.</p>`;
    saveBtn=`<button onclick="doRemove('${m.ruleId}')" style="padding:7px 18px;background:var(--color-text-danger);color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;">Yes, remove</button>`;
  }else if(m.type==='editProfile'){
    const ag3=getAgent(state.selectedId);
    title=`Edit profile: ${ag3?ag3.name:''}`;
    content=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:14px;">Set the account sources and business types this Sales Team member can handle. Changes update rule compatibility checks immediately.</p>
    <div style="margin-bottom:14px;">${fldH('Account Sources')}<div style="display:flex;flex-wrap:wrap;gap:2px 14px;">${renderCboxes(LS,'sources','prof')}</div></div>
    <div style="margin-bottom:6px;">${fldH('Business Types')}<div style="display:flex;flex-wrap:wrap;gap:2px 14px;">${renderCboxes(BT,'bizTypes','prof')}</div></div>`;

    const compat=state.agents.filter(a=>{const ag=getAgent(a.id);if(existIds.includes(a.id))return false;if(!rule)return true;return ag.sources.length===0||rule.sources.length===0||ag.sources.some(src=>rule.sources.includes(src));});

    content=`<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px;">Select a team member to take over this assignment. Former agent will be removed and new assignment created on export. Delete their Salesforce record manually after importing.</p>

          ${sdot(s)}
        </div>`;}).join('')}
      ${compat.length===0?`<div style="text-align:center;padding:20px;color:var(--color-text-secondary);">No compatible Sales Team members available.</div>`:''}
    </div>`;
  }else if(m.type==='preUpload'){
    const isRules=m.target==='rules';
    const sf=isRules?SF_LINKS.rules:SF_LINKS.agents;
    const inputId=isRules?'rulesCSVInput':'agentsCSVInput';
    title=isRules?'Upload Rules CSV':'Upload Sales Team CSV';
    content=`<div style="display:flex;flex-direction:column;gap:16px;">
      <div style="background:var(--color-background-info);border:1px solid var(--color-border-info);border-radius:var(--border-radius-lg);padding:16px 18px;">

            <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;"><strong>Business types:</strong> Regular Restaurant · Home Based Kitchen · Street Food</div>
            <div style="font-size:12px;color:var(--color-text-secondary);"><strong>Operations:</strong> AccountRecycling · LeadConversion · NewLeadConversion · OpportunityReassignment · OpportunityAutoAssignment</div>
          </div>
          <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:13px 15px;">
            <div style="font-weight:600;margin-bottom:6px;">Telesales / Telesales Mgr</div>
            <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;"><strong>Lead sources:</strong> Inbound · Self Sign Up</div>
            <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;"><strong>Business types:</strong> Regular Restaurant · Home Based Kitchen · Street Food</div>
            <div style="font-size:12px;color:var(--color-text-secondary);"><strong>Operations:</strong> AccountRecycling · LeadConversion · NewLeadConversion · OpportunityReassignment · OpportunityAutoAssignment · OpportunityAutoAssignmentFromCase · SSUAccountAutoAssignment</div>

        <br>
        <strong>What the badges on rule cards mean:</strong>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
          <div style="display:flex;align-items:flex-start;gap:10px;"><span style="background:var(--color-background-success);color:var(--color-text-success);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;flex-shrink:0;">✓ Best practice</span><span>Rule fully matches recommended settings for this role. No action needed.</span></div>
          <div style="display:flex;align-items:flex-start;gap:10px;"><span style="background:var(--color-background-warning);color:var(--color-text-warning);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;flex-shrink:0;">⚠ Review settings</span><span>One or more recommended fields are missing. The card shows exactly what's off and has a <strong>Fix now</strong> button that opens the editor.</span></div>

}

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  const sidebar=state.showHelp?'':renderSidebar();
  const main=state.showHelp?renderHelp():(state.selectedId?renderAgentDetail():renderDashboard());
  app.innerHTML=`${renderHeader()}<div style="display:flex;flex:1;overflow:hidden;">${sidebar}<div style="flex:1;overflow-y:auto;background:var(--color-background-tertiary);">${main}</div></div>${renderModal()}`;
}

// ---- HANDLERS ----
window.st=p=>{Object.assign(state,p);persist();};
window.render=render;

window.openEditRule=id=>{const r=state.rules.find(x=>x.id===id);if(!r)return;state.modal={type:'editRule',ruleId:id};state.modalForm={sources:[...r.sources],bizTypes:[...r.bizTypes],vertical:[...r.vertical],localities:[...r.localities],grades:[...r.grades],ops:[...r.ops]};render();};
window.saveEditRule=()=>{state.rules=state.rules.map(r=>r.id===state.modal.ruleId?{...r,...state.modalForm}:r);state.modal=null;state.modalForm=null;persist();};
window.openCreateRule=()=>{const a=getAgent(state.selectedId);const bp=getBP(state.selectedId);state.modal={type:'createRule'};state.modalForm={sources:bp?[...bp.sources]:(a?[...a.sources]:[]),bizTypes:bp?[...bp.bizTypes]:(a?[...a.bizTypes]:[]),vertical:[],localities:[],grades:[],ops:bp?[...bp.ops]:[]};render();};
window.saveCreateRule=()=>{const a=getAgent(state.selectedId);if(!a)return;const nr={id:'NEW-'+Date.now(),...state.modalForm,assignments:[{agentId:a.id,agentName:a.name,raId:'',rrId:'',isNew:true}]};state.rules=[...state.rules,nr];state.modal=null;state.modalForm=null;persist();};
window.openAddToRule=()=>{state.modal={type:'addToRule'};state.modalForm=null;render();};
window.addToExisting=id=>{const a=getAgent(state.selectedId);if(!a)return;state.rules=state.rules.map(r=>r.id===id?{...r,assignments:[...r.assignments,{agentId:a.id,agentName:a.name,raId:'',rrId:'',isNew:true}]}:r);state.modal=null;state.modalForm=null;persist();};
window.confirmRemove=id=>{state.modal={type:'confirmRemove',ruleId:id};state.modalForm=null;render();};
window.doRemove=id=>{state.rules=state.rules.map(r=>r.id===id?{...r,assignments:r.assignments.filter(a=>a.agentId!==state.selectedId)}:r);state.modal=null;state.modalForm=null;persist();};
window.openEditProfile=()=>{const a=getAgent(state.selectedId);state.modal={type:'editProfile'};state.modalForm={sources:a?[...a.sources]:[],bizTypes:a?[...a.bizTypes]:[]};render();};
window.saveEditProfile=()=>{if(!state.selectedId||!state.modalForm)return;state.agentOverrides[state.selectedId]={...state.modalForm};state.modal=null;state.modalForm=null;persist();};
window.openReplaceFormer=(ruleId,raId)=>{state.modal={type:'replaceFormer',ruleId,formerRaId:raId};state.modalForm=null;render();};
window.doReplaceFormer=(ruleId,formerRaId,newAgentId)=>{const a=getAgent(newAgentId);if(!a)return;state.rules=state.rules.map(r=>r.id!==ruleId?r:{...r,assignments:[...r.assignments.filter(x=>x.raId!==formerRaId),{agentId:newAgentId,agentName:a.name,raId:'',rrId:'',isNew:true}]});state.modal=null;state.modalForm=null;persist();};
window.applyBP=()=>{const a=getAgent(state.selectedId);const bp=a?BEST_PRACTICES[a.role]:null;if(!bp||!state.modalForm)return;state.modalForm.sources=[...bp.sources];state.modalForm.bizTypes=[...bp.bizTypes];state.modalForm.ops=[...bp.ops];render();};
window.updateField=(prefix,field,value,checked)=>{if(!state.modalForm)return;const arr=state.modalForm[field]?[...state.modalForm[field]]:[];state.modalForm[field]=checked?[...arr,value]:arr.filter(v=>v!==value);render();};
window.updateLocField=(prefix,loc,checked)=>{if(!state.modalForm)return;const arr=state.modalForm.localities?[...state.modalForm.localities]:[];state.modalForm.localities=checked?[...arr,loc]:arr.filter(v=>v!==loc);render();};
window.setAllLoc=(prefix,all)=>{if(!state.modalForm)return;state.modalForm.localities=all?[...LOCS]:[];render();};
window.filterLoc=prefix=>{const q=document.getElementById(prefix+'LS');if(!q)return;const v=q.value.toLowerCase();document.querySelectorAll('.'+prefix+'LI').forEach(el=>{el.style.display=el.dataset.loc.toLowerCase().includes(v)?'':'none';});};

window.handleRulesUpload=async function(event){
  const file=event.target.files[0];if(!file)return;
  try{
    const text=await parseFileAsCSV(file);
    const newRules=parseRulesCSV(text);
    state.rules=newRules;
    rematchRuleAgents();
    persist();
    showToast(`✓ Loaded ${newRules.length} rules from "${file.name}"`, 'success');
  }catch(err){showToast('Error parsing rules file: '+err.message,'error');}
  event.target.value='';
};

window.handleAgentsUpload=async function(event){
  const file=event.target.files[0];if(!file)return;
  try{
    const text=await parseFileAsCSV(file);
    const newAgents=parseAgentsCSV(text);
    state.agents=newAgents;
    rematchRuleAgents(); // re-reconcile existing rules against new team list
    persist();
    showToast(`✓ Loaded ${newAgents.length} Sales Team members from "${file.name}"`, 'success');
  }catch(err){showToast('Error parsing Sales Team file: '+err.message,'error');}
  event.target.value='';
};

window.resetDefaults=function(){
  if(!confirm('Reset all data to defaults? This clears uploaded CSVs and all changes.'))return;
  localStorage.removeItem('ruleops_state');
  location.reload();
};

// ---- INIT ----
loadState();
rematchRuleAgents();
render();
</script>
</body>
</html>
